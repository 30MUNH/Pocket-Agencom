<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 24px rgba(255, 143, 163, 0.08);
        }
        
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(247, 220, 222, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        .ambient-glow-1 {
            top: -200px;
            left: -200px;
        }

        .ambient-glow-2 {
            bottom: -200px;
            right: -200px;

<body class="bg-surface font-body-md text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="ambient-glow ambient-glow-1"></div>
<div class="ambient-glow ambient-glow-2"></div>
<div class="w-full max-w-md px-gutter relative z-10">
<!-- Logo -->
<div class="text-center mb-8">
<span class="text-headline-md font-headline-md font-extrabold text-primary">Pocket Agencom</span>
</div>
<!-- Forgot Password Card -->
<div class="glass-panel rounded-lg p-10 flex flex-col gap-8">
<!-- Header -->
<div class="text-center">
<div class="w-16 h-16 bg-secondary-container rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_4px_24px_rgba(255,143,163,0.08)]">
<span class="material-symbols-outlined text-[32px] text-secondary" style="font-variation-settings: 'FILL' 0;">lock_reset</span>
</div>
<h1 class="text-headline-md font-headline-md text-on-surface mb-2">Reset Your Password</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Enter your email address and we'll send you a link to reset your password.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault(); document.getElementById('success-message').classList.remove('hidden'); this.style.display = 'none';">
<div class="flex flex-col gap-2">
<label class="text-label-sm font-label-sm text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">mail</span>
<input class="w-full bg-surface-container-low border-transparent focus:border-transparent focus:ring-2 focus:ring-secondary-container rounded-full py-3 pl-12 pr-4 text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant/50 transition-shadow" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<button class="w-full bg-secondary-container hover:bg-secondary-container/80 text-on-secondary-container text-label-sm font-label-sm py-4 rounded-full transition-all duration-200 transform hover:-translate-y-0.5 shadow-[0_4px_24px_rgba(255,143,163,0.08)] flex items-center justify-center gap-2" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Success State (Hidden by default) -->
<div class="hidden flex-col items-center gap-6 text-center animate-fade-in" id="success-message">
<div class="w-16 h-16 bg-[#e0f2e9] rounded-full flex items-center justify-center mx-auto mb-2 shadow-[0_4px_24px_rgba(255,143,163,0.08)]">
<span class="material-symbols-outlined text-[32px] text-[#2e7d32]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<p class="text-body-md font-body-md text-on-surface-variant">We've sent a password reset link to your email. Please check your inbox.</p>
</div>
<!-- Footer Links -->
<div class="text-center mt-2 border-t border-surface-container-high pt-6">
<a class="inline-flex items-center gap-2 text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[16px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span>Back to Login</span>
</a>
</div>
</div>
<!-- Footer Info -->
<div class="text-center mt-8">
<p class="text-label-sm font-label-sm text-on-surface-variant/70">© 2024 Pocket Agencom. Need help? <a class="text-primary hover:underline" href="#">Contact Support</a></p>
</div>
</div>

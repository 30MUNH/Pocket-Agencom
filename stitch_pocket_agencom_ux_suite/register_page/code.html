<body class="bg-background text-on-background h-full font-body-md antialiased flex flex-col md:flex-row">
<!-- Left Side: Registration Form -->
<main class="flex-1 flex flex-col justify-center items-center p-gutter lg:px-section-padding-desktop w-full md:w-1/2 bg-surface-container-lowest">
<div class="w-full max-w-md">
<!-- Brand -->
<div class="mb-12">
<a class="inline-flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1; font-size: 32px;">support_agent</span>
<span class="text-headline-md font-headline-md font-extrabold text-primary tracking-tight">Pocket Agencom</span>
</a>
</div>
<!-- Header -->
<div class="mb-8">
<h1 class="text-display-lg-mobile md:text-display-lg font-display-lg-mobile md:font-display-lg mb-2 text-primary">Get Started</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant">Create your account to streamline your agency workflow.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Name -->
<div>
<label class="block text-label-sm font-label-sm text-on-surface mb-2 ml-1" for="name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
<input class="w-full pl-12 pr-4 py-4 rounded-full bg-surface-container-low border-transparent focus:border-secondary-container focus:bg-surface-container-lowest focus:ring-2 focus:ring-secondary-container transition-all outline-none text-body-md font-body-md" id="name" name="name" placeholder="Alex Morgan" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="block text-label-sm font-label-sm text-on-surface mb-2 ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="w-full pl-12 pr-4 py-4 rounded-full bg-surface-container-low border-transparent focus:border-secondary-container focus:bg-surface-container-lowest focus:ring-2 focus:ring-secondary-container transition-all outline-none text-body-md font-body-md" id="email" name="email" placeholder="alex@example.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block text-label-sm font-label-sm text-on-surface mb-2 ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="w-full pl-12 pr-4 py-4 rounded-full bg-surface-container-low border-transparent focus:border-secondary-container focus:bg-surface-container-lowest focus:ring-2 focus:ring-secondary-container transition-all outline-none text-body-md font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div>
<label class="block text-label-sm font-label-sm text-on-surface mb-2 ml-1" for="confirm_password">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">lock_clock</span>
<input class="w-full pl-12 pr-4 py-4 rounded-full bg-surface-container-low border-transparent focus:border-secondary-container focus:bg-surface-container-lowest focus:ring-2 focus:ring-secondary-container transition-all outline-none text-body-md font-body-md" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 mt-4 ml-1">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline text-secondary focus:ring-secondary-container bg-surface-container-low" id="terms" type="checkbox"/>
</div>
<label class="text-body-md font-body-md text-on-surface-variant text-sm" for="terms">
                        I agree to the <a class="text-primary font-bold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-bold hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Submit -->
<button class="w-full py-4 rounded-full bg-secondary-container text-on-secondary-container font-headline-md text-headline-md shadow-[0_4px_24px_rgba(255,143,163,0.08)] hover:bg-secondary-container/80 hover:-translate-y-0.5 transition-all duration-200 mt-8 flex justify-center items-center gap-2" type="submit">
                    Create Account
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<div class="mt-8 text-center">
<p class="text-body-md font-body-md text-on-surface-variant">
                    Already have an account? <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
</div>
</div>
</main>
<!-- Right Side: Illustration / Graphic (Desktop Only) -->
<aside class="hidden md:flex w-1/2 relative bg-secondary-container/20 items-center justify-center p-gutter overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute inset-0 z-0">
<div class="absolute top-1/4 left-1/4 w-64 h-64 bg-secondary-container rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
<div class="absolute top-1/3 right-1/4 w-72 h-72 bg-tertiary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000"></div>
<div class="absolute bottom-1/4 left-1/3 w-80 h-80 bg-primary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-4000"></div>
</div>
<!-- Image Container -->
<div class="relative z-10 w-full max-w-lg rounded-3xl overflow-hidden shadow-[0_12px_48px_rgba(255,143,163,0.15)] glass-panel p-4 border border-white/40">
<div class="rounded-2xl overflow-hidden bg-surface-container-lowest h-[600px] relative">
<img class="w-full h-full object-cover" data-alt="A soft, friendly illustration of a confident micro-business owner working effortlessly on a modern laptop in a bright, minimalist studio. The scene is illuminated by soft, natural, high-key lighting, creating a bright and airy light-mode aesthetic. The color palette features pristine whites, warm light greys, and gentle pastel pink accents, conveying a nurturing, high-end, and effortless brand personality." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTlAaCpLGllkLWQ58-ZL7jyzL4zuWVYbQus_WbWSJ7u0yr35FRyQbc5PkX04vuPVR5M4q6ebyUZrhGuX-mVynhcKretYry8Ym4pyt_Naufs2wOuth1TzW_ZfyXyW7DjnmegYqASwFjbh2EzD2eIN3plmzzBYpu3sNKt_T1UHpz3dC3SmrSNYe6FLE1SoccASGPf5wA1jT_7P1j2QJtlgxYybzX23P2mHWYXGvRhMJLGoxhQrgyQLCM1E7c0e3Y7IM4fLP08IrAtT8"/>
<!-- Overlay Widget -->
<div class="absolute bottom-6 left-6 right-6 glass-panel rounded-2xl p-6 border border-white/50 flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div>
<h3 class="text-label-sm font-label-sm text-primary mb-1">Effortless Management</h3>
<p class="text-body-md font-body-md text-on-surface-variant text-sm">Focus on growth, we'll handle the complex details.</p>
</div>
</div>
</div>
</div>
</aside>
